name: GitHub Actions Best Practices Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      # GHA filter patterns do not support brace expansion ({yml,yaml}) —
      # list the two extensions explicitly so both conventions are covered.
      - '.github/workflows/*.yml'
      - '.github/workflows/*.yaml'
      - '.github/actions/**/action.yml'
      - '.github/actions/**/action.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  review:
    uses: ./.github/workflows/_ai-review.yml
    # Permissions are granted HERE (on the calling job), not inside the reusable workflow:
    # the called workflow's GITHUB_TOKEN ceiling is whatever this job grants. Omitting any of
    # these would silently drop the sticky PR comment.
    permissions:
      contents: read         # checkout + composite action reads template/scripts from the tree
      pull-requests: write   # gh pr comment posts the findings summary to the PR conversation
      issues: write          # claude-code-action's agent-mode GitHub writes go through the issues-comments API
      id-token: write        # claude-code-action mints its GitHub App token via OIDC token exchange
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    with:
      domain: GitHub Actions YAML files
      reference_file: docs/references/github-actions-best-practices.md
      report_title: GitHub Actions Review
      artifact_name: gha-review-report
      timeout_minutes: 15
      # base_ref is interpolated in THIS caller's context before the string is passed as an input.
      discover_command: |
        If this is a PR (base ref is "${{ github.base_ref }}", non-empty means PR), run:
          git diff --name-only origin/${{ github.base_ref }}...HEAD -- .github/workflows/ .github/actions/
        If base ref is empty (workflow_dispatch), list all files instead:
          find .github/workflows .github/actions -name '*.yml' -o -name '*.yaml' 2>/dev/null
      checklist: |
        For workflow files (.github/workflows/):
        1. Permissions — a workflow-level default-deny block must exist; per-job grants add only what that job needs
        2. Action SHA pinning — every `uses:` must be pinned by full commit SHA, not by tag or floating branch
        3. timeout-minutes — every job must declare a timeout (the default is 6 hours — a hung step burns runner minutes silently)
        4. concurrency — PR-triggered workflows must have a concurrency group; cancel-in-progress should be true for PRs, false for main-branch pushes
        5. Reporting and cleanup steps — `if: always()` runs even on cancellation; use the `!cancelled()` condition (inside an `if:` expression) for reporting/cleanup
        6. Trigger filters — `on: push` without branch or path filters fires on every branch and tag push
        7. fail-fast in test matrices — should be false so all shards complete and the full failure picture is visible
        8. Cache key hygiene — dependency cache keys must include the lockfile hash; prefer setup-*/cache: option over bare actions/cache
        9. secrets: inherit in reusable workflows — leaks all caller secrets; pass only what's needed explicitly
        10. pull_request_target + checkout of PR head — dangerous: runs with secrets but executes untrusted fork code

        For composite actions (.github/actions/):
        11. using: composite — must be set (flag if missing or set to an unexpected value)
        12. shell: — must be explicit on every `run:` step; composite actions do not inherit a default shell
        13. secrets: block — composite actions cannot declare secrets; flag if present
