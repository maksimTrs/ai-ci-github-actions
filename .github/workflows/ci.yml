name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read  # workflow default — all jobs start with read-only GITHUB_TOKEN

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write  # required by dorny/test-reporter inside publish-test-results
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: '1.21'
          cache-dependency-path: bugtracker-backend/go.sum

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run backend tests
        working-directory: bugtracker-backend
        run: |
          go test -v -coverprofile=coverage.out -covermode=atomic ./... 2>&1 \
            | go-junit-report -set-exit-code > test-results.xml
          go tool cover -html=coverage.out -o coverage.html
          mkdir -p reports
          mv coverage.html reports/

      - uses: ./.github/actions/publish-test-results
        if: ${{ !cancelled() }}
        with:
          junit-path: bugtracker-backend/test-results.xml
          html-report-dir: bugtracker-backend/reports
          artifact-name: backend-coverage-report
          reporter-name: Backend Unit Tests

  unit-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bugtracker-frontend/package-lock.json

      - name: Run frontend tests
        working-directory: bugtracker-frontend
        run: |
          npm ci
          npm test
          rm -rf reports
          mkdir -p reports
          mv coverage reports/

      - uses: ./.github/actions/publish-test-results
        if: ${{ !cancelled() }}
        with:
          junit-path: bugtracker-frontend/test-results.xml
          html-report-dir: bugtracker-frontend/reports/coverage
          artifact-name: frontend-coverage-report
          reporter-name: Frontend Unit Tests

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [unit-backend, unit-frontend]
    permissions:
      contents: read
      checks: write
    env:
      FORCE_COLOR: '1'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1

      # ── Launch Application ────────────────────────────────────────────────
      - name: Start application
        run: docker compose up --build --wait --wait-timeout 60

      # ── API Tests ─────────────────────────────────────────────────────────
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Install API test dependencies
        working-directory: tests-api
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci

      - name: Run API tests
        working-directory: tests-api
        run: npx playwright test

      - uses: ./.github/actions/publish-test-results
        if: ${{ !cancelled() }}
        with:
          junit-path: tests-api/test-results/results.xml
          html-report-dir: tests-api/playwright-report
          artifact-name: api-tests-report
          reporter-name: API Tests

      # ── E2E Tests ─────────────────────────────────────────────────────────
      - name: Install E2E dependencies
        working-directory: tests-e2e
        run: npm ci

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests-e2e/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: tests-e2e
        run: npx playwright install --with-deps

      - name: Install Playwright OS deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: tests-e2e
        run: npx playwright install-deps

      - name: Run E2E tests
        working-directory: tests-e2e
        run: npx playwright test

      - uses: ./.github/actions/publish-test-results
        if: ${{ !cancelled() }}
        with:
          junit-path: tests-e2e/test-results/results.xml
          html-report-dir: tests-e2e/playwright-report
          artifact-name: e2e-tests-report
          reporter-name: E2E Tests

      # ── Performance Tests ─────────────────────────────────────────────────
      - name: Install k6 v2.0.0
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v2.0.0/k6-v2.0.0-linux-amd64.tar.gz \
            | tar xvz --strip-components 1
          sudo mv k6 /usr/local/bin/k6

      - name: Run performance tests
        working-directory: tests-perf
        run: k6 run script.js

      - name: Upload performance report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: performance-report
          path: tests-perf/perf-results.html
          retention-days: 14
          if-no-files-found: warn

      # ── Teardown ──────────────────────────────────────────────────────────
      - name: Tear down application
        if: ${{ always() }}
        run: docker compose down --volumes --remove-orphans --rmi local && docker image prune -f
