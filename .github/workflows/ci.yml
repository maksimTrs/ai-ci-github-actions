name: CI — Build, Test & Report

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: read  # workflow default — all jobs start with read-only GITHUB_TOKEN

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write  # required by dorny/test-reporter inside publish-test-results
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.6.0
        with:
          go-version: '1.21'
          cache-dependency-path: bugtracker-backend/go.sum

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@v2.1.0

      - name: Run backend tests
        working-directory: bugtracker-backend
        run: |
          go test -v -coverprofile=coverage.out -covermode=atomic ./... 2>&1 \
            | go-junit-report -set-exit-code > test-results.xml
          go tool cover -html=coverage.out -o coverage.html
          mkdir -p reports
          mv coverage.html reports/

      - name: Publish backend test results
        if: ${{ !cancelled() }}
        uses: ./.github/actions/publish-test-results
        with:
          junit-path: bugtracker-backend/test-results.xml
          html-report-dir: bugtracker-backend/reports
          artifact-name: backend-test-report
          reporter-name: Backend Unit Tests

  unit-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: bugtracker-frontend/package-lock.json

      - name: Run frontend tests
        working-directory: bugtracker-frontend
        run: |
          npm ci
          npm test
          mkdir -p reports
          mv coverage reports/coverage

      - name: Publish frontend test results
        if: ${{ !cancelled() }}
        uses: ./.github/actions/publish-test-results
        with:
          junit-path: bugtracker-frontend/test-results.xml
          html-report-dir: bugtracker-frontend/reports/coverage
          artifact-name: frontend-test-report
          reporter-name: Frontend Unit Tests

  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [unit-backend, unit-frontend]
    permissions:
      contents: read
      checks: write
    env:
      FORCE_COLOR: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1

      - name: Start application
        run: docker compose up --build --wait --wait-timeout 60

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tests-api/package-lock.json

      - name: Install API test dependencies
        working-directory: tests-api
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci

      - name: Run API tests
        working-directory: tests-api
        run: npx playwright test

      - name: Publish API test results
        if: ${{ !cancelled() }}
        uses: ./.github/actions/publish-test-results
        with:
          junit-path: tests-api/test-results/results.xml
          html-report-dir: tests-api/playwright-report
          artifact-name: api-test-report
          reporter-name: API Tests

      - name: Collect container logs on failure
        if: ${{ failure() }}
        run: |
          mkdir -p logs
          docker compose logs --no-color > logs/compose.log
          docker compose ps > logs/compose-ps.log

      - name: Upload container logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: api-tests-container-logs
          path: logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Tear down application
        if: ${{ always() }}
        run: docker compose down --volumes --remove-orphans --rmi local && docker image prune -f

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [unit-backend, unit-frontend]
    permissions:
      contents: read
      checks: write
    env:
      FORCE_COLOR: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1

      - name: Start application
        run: docker compose up --build --wait --wait-timeout 60

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tests-e2e/package-lock.json

      - name: Install E2E dependencies
        working-directory: tests-e2e
        run: npm ci

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('tests-e2e/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: tests-e2e
        run: npx playwright install --with-deps

      - name: Install Playwright OS deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: tests-e2e
        run: npx playwright install-deps

      - name: Run E2E tests
        working-directory: tests-e2e
        run: npx playwright test

      - name: Publish E2E test results
        if: ${{ !cancelled() }}
        uses: ./.github/actions/publish-test-results
        with:
          junit-path: tests-e2e/test-results/results.xml
          html-report-dir: tests-e2e/playwright-report
          artifact-name: e2e-test-report
          reporter-name: E2E Tests

      - name: Collect container logs on failure
        if: ${{ failure() }}
        run: |
          mkdir -p logs
          docker compose logs --no-color > logs/compose.log
          docker compose ps > logs/compose-ps.log

      - name: Upload container logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: e2e-tests-container-logs
          path: logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Tear down application
        if: ${{ always() }}
        run: docker compose down --volumes --remove-orphans --rmi local && docker image prune -f

  perf-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [unit-backend, unit-frontend]
    permissions:
      contents: read
      checks: write
    env:
      FORCE_COLOR: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1

      - name: Start application
        run: docker compose up --build --wait --wait-timeout 60

      - name: Install k6 v2.0.0
        run: |
          curl -L https://github.com/grafana/k6/releases/download/v2.0.0/k6-v2.0.0-linux-amd64.tar.gz \
            | tar xvz --strip-components 1
          sudo mv k6 /usr/local/bin/k6

      - name: Run performance tests
        working-directory: tests-perf
        run: |
          mkdir -p reports test-results
          k6 run script.js

      - name: Publish performance test results
        if: ${{ !cancelled() }}
        uses: ./.github/actions/publish-test-results
        with:
          junit-path: tests-perf/test-results/results.xml
          html-report-dir: tests-perf/reports
          artifact-name: perf-test-report
          reporter-name: Performance Tests

      - name: Collect container logs on failure
        if: ${{ failure() }}
        run: |
          mkdir -p logs
          docker compose logs --no-color > logs/compose.log
          docker compose ps > logs/compose-ps.log

      - name: Upload container logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: perf-tests-container-logs
          path: logs/
          retention-days: 7
          if-no-files-found: warn

      - name: Tear down application
        if: ${{ always() }}
        run: docker compose down --volumes --remove-orphans --rmi local && docker image prune -f

  publish-pages:
    name: Publish reports to GitHub Pages
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: [unit-backend, unit-frontend, api-tests, e2e-tests, perf-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write       # required by actions/deploy-pages
      id-token: write    # required for the OIDC token actions/deploy-pages signs with
    concurrency:
      group: pages-deploy
      cancel-in-progress: false  # never interrupt an in-flight Pages deploy
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1

      - name: Download all test reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          path: artifacts
          pattern: '*-test-report'

      - name: Compose Pages site
        env:
          COMMIT_SHA: ${{ github.sha }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          mkdir -p site/backend site/frontend site/api site/e2e site/perf

          cp -r artifacts/backend-test-report/.  site/backend/
          cp -r artifacts/frontend-test-report/. site/frontend/
          cp -r artifacts/api-test-report/.      site/api/
          cp -r artifacts/e2e-test-report/.      site/e2e/
          cp -r artifacts/perf-test-report/.     site/perf/

          # Backend (single coverage.html) and perf (single perf-results.html) have no
          # index.html — alias so /backend/ and /perf/ resolve to a default document.
          if [ -f site/backend/coverage.html ]; then
            cp site/backend/coverage.html site/backend/index.html
          fi
          if [ -f site/perf/perf-results.html ]; then
            cp site/perf/perf-results.html site/perf/index.html
          fi

          # Render the landing page from the template. The positional arg restricts
          # envsubst to these three vars so no other env (e.g., GITHUB_TOKEN) can leak.
          export SHORT_SHA="${COMMIT_SHA:0:7}"
          export TIMESTAMP="$(date -u +'%Y-%m-%d %H:%M UTC')"
          envsubst '$SHORT_SHA $TIMESTAMP $RUN_NUMBER' \
            < .github/pages/index.template.html \
            > site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
