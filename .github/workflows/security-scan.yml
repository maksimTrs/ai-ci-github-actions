name: Security — Trivy Scan

# Dedicated security workflow (NOT a job in ci.yml). ci.yml ignores Dockerfile/
# compose changes by design; a vulnerability scan must run ON those changes, so it
# lives here with its own triggers. Two independent jobs:
#   - trivy-fs:    Go + npm dependencies (go.sum, package-lock.json), IaC misconfig
#                  (Dockerfiles, compose) and secrets — static, no build.
#   - trivy-image: CVEs in the OS packages / layers of the BUILT images — the layer
#                  static fs analysis can't see. Builds each app image, then scans it.
# Both are report-only (exit-code 0): findings surface in the Code scanning tab and
# (for trivy-fs) a PR comment, but never fail the build.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

# Default-deny. The job below widens it: security-events:write to publish SARIF,
# and pull-requests/issues:write to post the sticky findings comment.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write  # required to publish SARIF to the Code scanning tab
      pull-requests: write    # required to create the PR comment
      issues: write           # PR comments are created via the Issues API endpoint
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1
          # No git ops here need auth (Trivy reads files as data; SARIF upload uses the API token).
          # Drop the token from .git/config so the PR-head render script has no credential to read.
          persist-credentials: false

      # Pass 1 — full inventory for the Code scanning tab. exit-code 0 so the SARIF
      # always uploads; no severity filter so the tab shows the complete picture,
      # including misconfig (opinionated IaC lint kept out of the gate below).
      - name: Trivy scan (SARIF, report-only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'

      - name: Upload SARIF to Code scanning
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496  # codeql-bundle-v2.25.6
        with:
          sarif_file: trivy-results.sarif

      # Pass 2 — fixable HIGH/CRITICAL findings, report-only. Reuses Trivy's local DB cache from
      # pass 1 (same runner), so no second DB download. JSON (not table): the aggregator extracts
      # only .Vulnerabilities[]/.Secrets[], dropping the full "Report Summary" + VEX-notice noise
      # that table format bakes in. exit-code 0: findings are surfaced (comment + Code scanning)
      # but never fail the build — the app code is a CI showcase target, not a shipped artifact.
      # Flip exit-code to '1' to turn this into a hard gate. misconfig stays out of this pass (see pass 1).
      - name: Trivy scan (findings JSON — report-only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          format: json
          output: trivy-fs.json
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      # Pure transformation: scan JSON -> Markdown body. Carries NO token and makes NO API calls,
      # so it is safe to run from the checked-out (PR-head) script — the credential never enters
      # this step. Extracting it (vs. inline) makes it shellcheck-able and locally runnable.
      - name: Render fs-scan comment body
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        shell: bash
        env:
          FINDINGS_JSON: trivy-fs.json
          OUT: ${{ runner.temp }}/trivy-fs-comment.md
          MARKER: '<!-- security-scan:trivy-fs -->'
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SECURITY_URL: ${{ github.server_url }}/${{ github.repository }}/security/code-scanning?query=tool%3ATrivy
        run: bash .github/scripts/render-trivy-fs-comment.sh

      # Sticky PR comment — same marker-based PATCH/POST pattern as publish-review-report, so it
      # updates in place on re-runs and stays independent of the AI-review comments. This is the
      # ONLY step holding the write token; its logic stays inline so on pull_request it is taken
      # from the base branch — a PR cannot alter how or where it posts. !cancelled() so it posts
      # even if an earlier step failed; skipped on push/workflow_dispatch (no PR to comment on).
      - name: Post or update sticky Trivy PR comment
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MARKER: '<!-- security-scan:trivy-fs -->'
          BODY_FILE: ${{ runner.temp }}/trivy-fs-comment.md
        run: |
          set -euo pipefail
          # Find this comment by its hidden marker (substring match), then PATCH it; POST first time.
          ids=$(gh api --paginate "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
                --jq 'map(select(.body | contains(env.MARKER))) | .[].id')
          id=${ids%%$'\n'*}
          if [ -n "$id" ]; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$id" -F body=@- < "$BODY_FILE"
            echo "Updated sticky Trivy comment ($id)."
          else
            gh api --method POST "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" -F body=@- < "$BODY_FILE"
            echo "Created sticky Trivy comment."
          fi

  # Builds each application/test image, then scans its layers for OS-package + library
  # CVEs — the dimension trivy-fs (static, no build) cannot see. One matrix shard per
  # image so they build and scan in parallel and surface as independent PR checks.
  trivy-image:
    name: Trivy image scan (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      # Don't abort the other images when one shard finds CVEs — see the full picture.
      fail-fast: false
      matrix:
        image:
          - { name: backend,  context: bugtracker-backend }
          - { name: frontend, context: bugtracker-frontend }
          - { name: e2e,      context: tests-e2e }
    permissions:
      contents: read
      security-events: write  # required to publish SARIF to the Code scanning tab
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1

      # Plain build from the image's own context — none of these need build-args
      # (compose passes NEXT_PUBLIC_API_URL as a runtime env, not a build-arg).
      - name: Build image
        run: docker build -t "local/${{ matrix.image.name }}:scan" "${{ matrix.image.context }}"

      # report-only: ignore-unfixed drops base-image CVEs with no upstream patch (noise you
      # can't action), HIGH,CRITICAL keeps the tab to actionable signal. exit-code 0 never
      # fails the build. Flip to exit-code '1' to make a failed image scan a hard gate.
      - name: Trivy image scan (SARIF, report-only)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: image
          image-ref: local/${{ matrix.image.name }}:scan
          format: sarif
          output: trivy-image-${{ matrix.image.name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      # category MUST be unique per image — without it, each matrix shard's upload
      # overwrites the previous one and the tab shows only the last image scanned.
      - name: Upload SARIF to Code scanning
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@c35d1b164463ee62a100735382aaaa525c5d3496  # codeql-bundle-v2.25.6
        with:
          sarif_file: trivy-image-${{ matrix.image.name }}.sarif
          category: trivy-image-${{ matrix.image.name }}

      # Machine-readable JSON for the aggregated PR comment (parsed by trivy-image-comment via jq).
      # `format: table` would emit Trivy's full "Report Summary" listing every scanned target
      # (hundreds of clean node_modules entries) — noise that buries the findings AND blows past
      # the 65 KB comment limit. JSON lets the aggregator extract ONLY the vulnerabilities.
      # Same filters as the SARIF above; this 2nd run reuses the built image + cached DB, so cheap.
      - name: Trivy image scan (JSON for comment)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: image
          image-ref: local/${{ matrix.image.name }}:scan
          format: json
          output: trivy-image-${{ matrix.image.name }}.json
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      # Hand the per-image findings JSON to the aggregation job. Distinct artifact + filename per
      # image so the merge-multiple download lands all three side by side without collision.
      - name: Upload findings JSON
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: trivy-image-findings-${{ matrix.image.name }}
          path: trivy-image-${{ matrix.image.name }}.json
          retention-days: 7
          if-no-files-found: error

  # Aggregates the per-image findings tables (matrix artifacts) into ONE sticky PR comment,
  # matching the one-sticky-per-concern pattern of the other reviewers. needs: trivy-image
  # waits for every matrix shard; same marker-based PATCH/POST as trivy-fs / publish-review-report.
  trivy-image-comment:
    name: Trivy image findings comment
    needs: trivy-image
    if: ${{ !cancelled() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write    # required to create the PR comment
      issues: write           # PR comments are created via the Issues API endpoint
    steps:
      # Checkout BEFORE downloading artifacts: actions/checkout cleans the workspace, which would
      # wipe the downloaded findings/. sparse-checkout pulls essentially only .github/scripts, so
      # the minimum of PR-head code is materialized (this job runs on the pull_request head).
      - name: Checkout scripts
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 1
          sparse-checkout: .github/scripts
          # No git ops need auth here — drop the token from .git/config so the PR-head render
          # script (next step) has no credential to read. Keeps the write token to the post step.
          persist-credentials: false

      # merge-multiple flattens every trivy-image-findings-* artifact into one dir. Filenames
      # carry the image name, so the three JSONs coexist as findings/trivy-image-<name>.json.
      - name: Download findings JSON
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          pattern: trivy-image-findings-*
          path: findings
          merge-multiple: true

      # Pure transformation: findings JSON -> Markdown body. Carries NO token and makes NO API
      # calls, so it is safe to run from the checked-out (PR-head) script — the credential never
      # enters this step. Extracting it (vs. inline) makes it shellcheck-able and locally runnable.
      - name: Render image-scan comment body
        shell: bash
        env:
          FINDINGS_DIR: findings
          OUT: ${{ runner.temp }}/trivy-image-comment.md
          MARKER: '<!-- security-scan:trivy-image -->'
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SECURITY_URL: ${{ github.server_url }}/${{ github.repository }}/security/code-scanning?query=tool%3ATrivy
        run: bash .github/scripts/render-trivy-image-comment.sh

      # Sensitive half: the ONLY step holding the write token. Its logic stays inline so on
      # pull_request it is taken from the base branch — a PR cannot alter how or where it posts.
      - name: Post or update sticky image-scan comment
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MARKER: '<!-- security-scan:trivy-image -->'
          BODY_FILE: ${{ runner.temp }}/trivy-image-comment.md
        run: |
          set -euo pipefail
          # Find this comment by its hidden marker (substring match), then PATCH it; POST first time.
          ids=$(gh api --paginate "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
                --jq 'map(select(.body | contains(env.MARKER))) | .[].id')
          id=${ids%%$'\n'*}
          if [ -n "$id" ]; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$id" -F body=@- < "$BODY_FILE"
            echo "Updated sticky image-scan comment ($id)."
          else
            gh api --method POST "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" -F body=@- < "$BODY_FILE"
            echo "Created sticky image-scan comment."
          fi
