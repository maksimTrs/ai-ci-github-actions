# Keeps SHA-pinned actions current: Dependabot bumps the commit SHA and the
# trailing version comment together, so pinning stays both secure and fresh.
version: 2
updates:
  - package-ecosystem: github-actions
    # "/" only covers .github/workflows — composite actions are NOT auto-discovered
    # (dependabot-core#6704), so each .github/actions/* directory is listed explicitly.
    # Add new composite actions here, or their pins will rot silently.
    directories:
      - /
      - /.github/actions/publish-test-results
      - /.github/actions/publish-review-report
    schedule:
      # Monthly: pins are immutable SHAs and bot PRs trigger zero AI/CI jobs anyway —
      # the lower cadence just reduces PR-review noise.
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      # One grouped PR for all action bumps instead of one PR per action
      github-actions:
        patterns:
          - '*'
